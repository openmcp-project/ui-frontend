# Publishes the openmcp smoke test container to ghcr.io.
# Triggered on release (tag) or manually.
# The image is standalone and can be used against any openmcp-project UI
# deployment — not just the one in this repo.

name: Publish Smoke Test Container

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag, e.g. v1.0.0 (defaults to 'latest')"
        required: false
        default: "latest"
  push:
    tags:
      - "smoke-test/v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io/openmcp-project
  IMAGE_NAME: mcp-ui-smoke-test

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/smoke-test/}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: smoke-test/
          file: smoke-test/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
          labels: |
            org.opencontainers.image.title=openmcp UI Smoke Test
            org.opencontainers.image.description=Portable smoke test container for openmcp-project UI deployments
            org.opencontainers.image.source=https://github.com/openmcp-project/ui-frontend
            org.opencontainers.image.licenses=Apache-2.0
